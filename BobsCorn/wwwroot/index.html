<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corn Market</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="wrap">

        <header class="header">
            <span class="header-icon">🌽</span>
            <h1>Bob Market</h1>
            <p>Fresh corn, one ear at a time</p>
        </header>

        <div class="card">
            <div class="price-row">
                <span>Price per ear</span>
                <span class="price-badge">$0.75 / ear</span>
            </div>

            <div class="client-group">
                <label class="client-label" for="clientSelect">Client</label>
                <select class="client-select" id="clientSelect">
                    <option value="" disabled selected>Select a client…</option>
                    <option value="001">Alice Johnson</option>
                    <option value="002">Bob Martinez</option>
                    <option value="003">Carol Smith</option>
                    <option value="004">David Lee</option>
                    <option value="005">Eva Morales</option>
                </select>
            </div>

            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Ear bought</div>
                    <div class="metric-value" id="count">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Total spent</div>
                    <div class="metric-value" id="total">$0.00</div>
                </div>
            </div>

            <button class="buy-btn" onclick="buyCorn()">
                <span class="btn-icon">🌽</span>
                Buy 1 ear of corn
            </button>
        </div>

        <div class="card">
            You can buy at most 1 corn per minute per client.
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
